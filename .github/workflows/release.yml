name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test before publishing anything
        run: |
          python -m pip install -e "./protocol[dev]" -e ./sdk
          pytest protocol/tests sdk/tests -q
      - name: Build both packages
        run: |
          python -m pip install build twine
          python -m build protocol --outdir dist
          python -m build sdk --outdir dist
          twine check dist/*
      # Attaches artifacts to the GitHub Release for this tag (creates the
      # release if it does not exist yet; keeps an existing curated body).
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
