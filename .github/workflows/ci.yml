name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install both packages
        run: python -m pip install -e "./protocol[dev]" -e ./sdk
      - name: Run test suites
        run: pytest protocol/tests sdk/tests -q
      - name: CLI smoke — validate + conformance-test the example plugin
        run: |
          atlas validate examples/hello_sensor
          atlas test examples/hello_sensor

  build:
    name: build wheels + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build twine
      - run: python -m build protocol --outdir dist
      - run: python -m build sdk --outdir dist
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
